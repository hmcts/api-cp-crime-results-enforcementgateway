openapi: 3.0.0
info:
  title: Enforcement Hearing Gateway API
  description: >-
    CCT-1222 (Enforcement 2025) — contract for confirming enforcement hearings from Common Platform
    to Libra/GoB. Covers FR09 (hearing confirmation on allocation) and FR11 (hearing updates on
    amendment). DRAFT: the authoritative endpoint contract is Libra-owned and must be reconciled
    (see CCT-1222 Listing and Hearing Confirmation Design §11).
  version: 0.1.0
  contact:
    email: no-reply@hmcts.com
  license:
    name: MIT
    url: 'https://opensource.org/licenses/MIT'

servers:
  - description: Draft — to be confirmed (Libra endpoint via APIM)
    url: https://virtserver.swaggerhub.com/HMCTS-DTS/api-cp-crime-caseingestion-enforcementgateway/0.1.0

paths:
  /confirmedHearing:
    post:
      summary: Confirm an enforcement hearing to Libra (GoB)
      description: >-
        Sent by Common Platform when an enforcement case is allocated to a court hearing (FR09) or an
        existing allocation is amended (FR11). DRAFT contract.
      operationId: postConfirmedHearing
      tags:
        - enforcement-hearing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmedHearing"
      responses:
        '200':
          description: Hearing confirmation accepted by Libra
        '202':
          description: Hearing confirmation accepted for processing
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    ConfirmedHearing:
      description: Confirmed enforcement hearing details sent to Libra/GoB.
      type: object
      required:
        - caseUrn
        - courtHearingLocation
        - dateOfHearing
        - timeOfHearing
      properties:
        caseUrn:
          description: CP-minted case URN for the enforcement case.
          type: string
          example: "12GD3456789"
        courtHearingLocation:
          description: Court hearing location OU code.
          type: string
          example: "B01LY"
        dateOfHearing:
          description: Allocated hearing date.
          type: string
          format: date
          example: "2026-07-15"
        timeOfHearing:
          description: Allocated hearing start time (HH:MM).
          type: string
          example: "10:00"

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Machine-readable error code
        message:
          type: string
          description: Human-readable error message
        details:
          type: object
          additionalProperties: true
          description: Additional error context
        timestamp:
          type: string
          format: date-time
        traceId:
          type: string
          description: Unique identifier for error tracing
